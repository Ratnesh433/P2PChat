<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2PChat - Lobby</title>
    <link rel="stylesheet" href="lobby.css">
</head>
<body>
    
    <main id="lobby-container">
        <div id="form-card">
            <div id="form-card-header">
                <p>🚀 Join or Create a Room</p>
            </div>

            <form id="join-form">
                <label for="invite_link">Enter Room Name</label>
                <input type="text" id="invite_link" name="invite_link" placeholder="e.g., developers-hangout" required/>
                <button type="submit" class="btn">Join Room</button>
            </form>
        </div>
    </main>

<script>
    const joinForm = document.getElementById('join-form');

    joinForm.addEventListener('submit', (e) => {
        e.preventDefault();
        // Generate a unique room name if the user leaves it blank, otherwise use their input
        const inviteCode = e.target.invite_link.value.trim() || `room-${Math.floor(Math.random() * 10000)}`;
        window.location.href = `index.html?room=${encodeURIComponent(inviteCode)}`; 
    });
</script>

</body>
</html>
