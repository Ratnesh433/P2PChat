<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2PChat - Room</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main id="room-container">
        <div id="video-streams">
            <video class="video-player" id="user-1" autoplay playsinline></video>
            <video class="video-player" id="user-2" autoplay playsinline></video>
        </div>

        <footer id="controls-wrapper">
            <div class="control-container">
                <button id="mic-btn" class="control-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z"/><path d="M17 11a5 5 0 0 1-5 5A5 5 0 0 1 7 11H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/></svg>
                </button>
                <button id="camera-btn" class="control-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M14 8a2 2 0 1 0-4 0a2 2 0 0 0 4 0Z"/><path fill-rule="evenodd" d="M3 6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V6Zm11.599 4.543a.5.5 0 0 0 .802-.401V8.11a3 3 0 0 0-2.5-2.986V5a2 2 0 0 0-4 0v.124a3 3 0 0 0-2.5 2.986v1.986a.5.5 0 0 0 .802.401l1.9-1.425a1 1 0 0 1 1.196 0l1.9 1.425Z" clip-rule="evenodd"/></svg>
                </button>
                 <button id="leave-btn" class="control-btn leave">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12.52 4.47a.75.75 0 0 1 0 1.06L8.06 10H18a.75.75 0 0 1 0 1.5H8.06l4.47 4.47a.75.75 0 1 1-1.06 1.06l-6-6a.75.75 0 0 1 0-1.06l6-6a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd"/></svg>
                </button>
            </div>
        </footer>
    </main>
    
    <script src="https://download.agora.io/rtm/release/agora-rtm-sdk-1.5.1.js"></script>
    <script src="main.js"></script>
</body>
</html>
